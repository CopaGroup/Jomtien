        function switchLanguage(lang) {
            if (!translations[lang]) return;

            currentLang = lang;
            document.documentElement.lang = lang;
            const data = translations[lang];

            document.querySelectorAll('[data-key]').forEach(el => {
                const key = el.dataset.key;
                if (data[key]) {
                    // Only update if the element is not part of the removed gallery elements
                    if (key !== 'galleryTitle' && key !== 'galleryImg1Desc' && key !== 'galleryImg2Desc') {
                         el.innerHTML = data[key];
                    } else if (key === 'galleryTitle' && el.tagName.toLowerCase() === 'h2') {
                        el.innerHTML = ''; // Ensure the h2 is empty
                    } else if ((key === 'galleryImg1Desc' || key === 'galleryImg2Desc') && el.tagName.toLowerCase() === 'p') {
                        el.innerHTML = ''; // Ensure the p is empty
                    }
                }
            });

            document.querySelectorAll('.lang-btn').forEach(btn => {
                btn.classList.remove('active');
                if (btn.classList.contains(lang)) {
                    btn.classList.add('active');
                }
            });

            if (rapportChart && data.chartRapport) {
                rapportChart.data.labels = data.chartRapport.labels;
                rapportChart.data.datasets[0].label = data.chartRapport.label;
                rapportChart.update();
            }
        }
